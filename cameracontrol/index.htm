<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTZ Preset Controller</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- HLS.js for browsers that need it -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
    }

    header {
        background: #0078d4;
        color: white;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .header-left h2 {
        margin: 0;
    }

    .header-right {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .layout {
        display: flex;
        height: calc(100vh - 60px);
    }

    .preview {
        flex: 0 0 40%;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .preview img,
    .preview video {
        width: 100%;
        height: auto;
        object-fit: contain;
    }

    .presets {
        flex: 1;
        overflow-y: auto;
    }

    .preset {
        background: white;
        padding: 10px 12px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        border: 2px solid transparent;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: border 0.15s, box-shadow 0.15s, transform 0.05s;
    }

    .preset:hover {
        border-color: #0078d4;
        box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        transform: translateY(-1px);
    }

    .preset img {
        width: 100%;
        border-radius: 6px;
    }

    .preset-label {
        font-size: 15px;
        font-weight: 600;
        text-align: left;
    }

    button {
        padding: 8px 12px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        background: #0078d4;
        color: white;
        cursor: pointer;
        white-space: nowrap;
    }

    button:hover {
        background: #005fa3;
    }

    /* Thumbnail toggle */
    body.hide-thumbs .preset img {
        display: none;
    }

    /* === TAB BAR === */
    .tab-bar {
        display: flex;
        gap: 0;
        background: #e0e0e0;
        border-bottom: 2px solid #0078d4;
    }

    .tab-btn {
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        background: #e0e0e0;
        color: #555;
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: background 0.15s, color 0.15s;
    }

    .tab-btn:hover {
        background: #d0d0d0;
    }

    .tab-btn.active {
        background: #f5f5f5;
        color: #0078d4;
        border-bottom-color: #0078d4;
    }

    .tab-panel {
        display: none;
        flex: 1;
        overflow-y: auto;
    }

    .tab-panel.active {
        display: block;
    }

    /* === SEQUENCES PANEL === */
    .sequences-panel {
        padding: 20px;
    }

    .seq-status {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        padding: 16px;
        margin-bottom: 16px;
        display: none;
    }

    .seq-status.active {
        display: block;
    }

    .seq-status-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    .seq-status-name {
        font-size: 16px;
        font-weight: 700;
        color: #0078d4;
    }

    .seq-status-badge {
        font-size: 12px;
        padding: 3px 10px;
        border-radius: 12px;
        background: #e8f4fd;
        color: #0078d4;
        font-weight: 600;
    }

    .seq-steps-progress {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-bottom: 10px;
    }

    .seq-step-pip {
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        background: #f0f0f0;
        color: #888;
        transition: background 0.2s, color 0.2s;
    }

    .seq-step-pip.active {
        background: #0078d4;
        color: white;
        font-weight: 600;
    }

    .seq-step-pip.done {
        background: #d4edda;
        color: #155724;
    }

    .seq-next-btn {
        padding: 10px 20px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #28a745;
        color: white;
        transition: background 0.15s;
    }

    .seq-next-btn:hover {
        background: #218838;
    }

    .seq-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
    }

    .seq-card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        padding: 16px;
        border: 2px solid transparent;
        transition: border 0.15s, box-shadow 0.15s;
    }

    .seq-card:hover {
        border-color: #0078d4;
        box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .seq-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .seq-card-name {
        font-size: 16px;
        font-weight: 700;
    }

    .seq-card-meta {
        font-size: 13px;
        color: #777;
        margin-bottom: 10px;
    }

    .seq-card-steps {
        font-size: 12px;
        color: #999;
        margin-bottom: 12px;
        line-height: 1.5;
    }

    .seq-mode-btns {
        display: flex;
        gap: 6px;
    }

    .seq-mode-btn {
        flex: 1;
        padding: 7px 4px;
        font-size: 12px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #0078d4;
        color: white;
        transition: background 0.15s;
    }

    .seq-mode-btn:hover {
        background: #005fa3;
    }

    /* Global stop button */
    #globalStopBtn {
        display: none;
        padding: 8px 16px;
        font-size: 14px;
        font-weight: 700;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #d64045;
        color: white;
        animation: pulse-stop 1.5s infinite;
    }

    #globalStopBtn:hover {
        background: #b33438;
    }

    #globalStopBtn.visible {
        display: inline-block;
    }

    @keyframes pulse-stop {
        0%, 100% { box-shadow: 0 0 0 0 rgba(214,64,69,0.5); }
        50% { box-shadow: 0 0 0 6px rgba(214,64,69,0); }
    }

    @media (max-width: 900px) and (orientation: landscape) {
        #presetGrid {
            grid-template-columns: repeat(2, 1fr) !important;
        }
        .preview {
            flex: 0 0 35%;
        }
    }

    @media (max-width: 700px) {
        .layout {
            flex-direction: column;
        }
        .preview {
            flex: 0 0 auto;
            height: 35vh;
        }
        #presetGrid {
            grid-template-columns: repeat(2, 1fr) !important;
        }
    }
</style>
</head>
<body>

<header>
    <div class="header-left">
        <h2>Camera Presets</h2>
    </div>
    <div class="header-right">        <button id="globalStopBtn" onclick="stopSequence()">&#9632; Stop Sequence</button>        <button onclick="switchToMJPEG()">MJPEG</button>
        <button onclick="switchToHLS()">HLS w/ 🔉</button>
        <button onclick="toggleThumbnails()">Thumbnails</button>
	<button onclick="requestWakeLock()">Keep Awake</button>
    </div>
</header>

<div class="layout">
    <div class="preview">
        <img id="liveFeed" style="display:block;">
	<video id="liveFeedVideo"
	       controls
	       playsinline
	       webkit-playsinline
	       autoplay muted
	       style="display:none; width:100%; height:auto;">
	</video>

    </div>

    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('presets')">Presets</button>
            <button class="tab-btn" onclick="switchTab('sequences')">Sequences</button>
        </div>

        <div class="tab-panel active presets" id="presetPanel">
            <div id="presetGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:20px;"></div>
        </div>

        <div class="tab-panel sequences-panel" id="sequencesPanel">
            <div class="seq-status" id="seqStatus">
                <div class="seq-status-header">
                    <span class="seq-status-name" id="seqStatusName"></span>
                    <span class="seq-status-badge" id="seqStatusBadge"></span>
                </div>
                <div class="seq-steps-progress" id="seqStepsProgress"></div>
                <div id="seqNextArea"></div>
            </div>
            <div class="seq-grid" id="seqGrid"></div>
        </div>
    </div>
</div>

<script>
// ------------------------------------------------------------
// CONFIGURATION
// ------------------------------------------------------------

// All camera access is proxied through this server.
// Apache (see sites-enabled/000-default.conf):
//   ProxyPass        /mjpeg  http://CAMERA_IP/cgi-bin/mjpeg connectiontimeout=5 timeout=1
//   ProxyPassReverse /mjpeg  http://CAMERA_IP/cgi-bin/mjpeg
//   ProxyPass        /hls/   http://ENCODER_IP:PORT/
//   ProxyPassReverse /hls/   http://ENCODER_IP:PORT/
//   ProxyPass        /cam/ptz http://CAMERA_IP/cgi-bin/aw_ptz
//   ProxyPassReverse /cam/ptz http://CAMERA_IP/cgi-bin/aw_ptz

// Wake Lock
let wakeLock = null;

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request("screen");

    wakeLock.addEventListener("release", () => {
      console.log("Wake Lock was released");
    });

    console.log("Wake Lock is active");
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
}

// Re-request if the tab becomes visible again
document.addEventListener("visibilitychange", () => {
  if (wakeLock !== null && document.visibilityState === "visible") {
    requestWakeLock();
  }
});


const LIVE_URL = "/mjpeg";            // proxied MJPEG
const HLS_URL  = "/hls/2.m3u8";  // proxied HLS

// ------------------------------------------------------------
// LOAD PRESETS & BUILD GRID
// ------------------------------------------------------------
fetch('presets.json')
    .then(r => r.json())
    .then(presets => {
        const grid = document.getElementById("presetGrid");
        presets.forEach(preset => {
            const div = document.createElement("div");
            div.className = "preset";
            div.onclick = function() { goToPreset(preset.number, this); };

            const img = document.createElement("img");
            img.src = preset.image;

            const label = document.createElement("div");
            label.className = "preset-label";
            label.textContent = `${preset.number} — ${preset.label}`;

            div.appendChild(img);
            div.appendChild(label);
            grid.appendChild(div);
        });
    })
    .catch(err => console.error('Failed to load presets:', err));

// ------------------------------------------------------------
// SEND PRESET COMMAND (proxied PTZ)
// ------------------------------------------------------------
function goToPreset(num, btn) {
    // Manual preset selection stops any running sequence
    if (btn) stopSequence();

    const index = num - 1;
    const cmd = index.toString().padStart(2, "0");
    const url = `/cam/ptz?cmd=%23R${cmd}&res=1`;

    fetch(url).then(r => {
        if (!r.ok) throw new Error(r.status);
    }).catch(() => {
        if (btn) {
            btn.style.outline = '2px solid #d64045';
            setTimeout(() => { btn.style.outline = ''; }, 1000);
        }
    });
}

// ------------------------------------------------------------
// MJPEG / HLS TOGGLE
// ------------------------------------------------------------
function switchToMJPEG() {
    const img = document.getElementById("liveFeed");
    const video = document.getElementById("liveFeedVideo");

    video.pause();
    video.style.display = "none";

    img.style.display = "block";
    img.src = LIVE_URL + "?t=" + Date.now(); // cache-bust to force reconnect
}

function switchToHLS() {
    const img = document.getElementById("liveFeed");
    const video = document.getElementById("liveFeedVideo");

    img.style.display = "none";
    video.style.display = "block";

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(HLS_URL);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
        video.src = HLS_URL;
        video.play();
    }
}

// ------------------------------------------------------------
// THUMBNAIL TOGGLE
// ------------------------------------------------------------
function toggleThumbnails() {
    document.body.classList.toggle("hide-thumbs");
}

// ------------------------------------------------------------
// TAB SWITCHING
// ------------------------------------------------------------
function switchTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

    if (tabName === 'presets') {
        document.getElementById('presetPanel').classList.add('active');
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        // Switching to presets stops any running sequence
        stopSequence();
    } else {
        document.getElementById('sequencesPanel').classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }
}

// ------------------------------------------------------------
// SEQUENCE ENGINE
// ------------------------------------------------------------
let sequences = [];
let activeSequence = null;
// activeSequence = { name, steps, mode, stepIndex, direction, timer }
// mode: 'auto' | 'semi' | 'boomerang'
// direction: 1 (forward) | -1 (backward) — used by boomerang

async function loadSequences() {
    try {
        const resp = await fetch('sequences.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error(resp.status);
        sequences = await resp.json();
    } catch {
        sequences = [];
    }
    renderSequences();
}

function renderSequences() {
    const grid = document.getElementById('seqGrid');
    grid.innerHTML = '';

    if (sequences.length === 0) {
        grid.innerHTML = '<p style="color:#999;">No sequences found. Create a <code>sequences.json</code> file.</p>';
        return;
    }

    sequences.forEach(seq => {
        const card = document.createElement('div');
        card.className = 'seq-card';

        const totalTime = seq.steps.reduce((s, st) => s + st.delay, 0);
        const stepList = seq.steps.map((st, i) =>
            `${i + 1}. Preset ${st.preset}` + (st.label ? ` (${st.label})` : '') + (st.delay > 0 ? ` \u2014 ${st.delay}s` : '')
        ).join('<br>');

        const safeName = escapeHtml(seq.name);

        card.innerHTML =
            '<div class="seq-card-header">' +
                '<span class="seq-card-name">' + safeName + '</span>' +
            '</div>' +
            '<div class="seq-card-meta">' +
                seq.steps.length + ' step' + (seq.steps.length !== 1 ? 's' : '') +
                (totalTime > 0 ? ' &middot; ' + totalTime + 's per cycle' : '') +
            '</div>' +
            '<div class="seq-card-steps">' + stepList + '</div>' +
            '<div class="seq-mode-btns">' +
                '<button class="seq-mode-btn" data-seq="' + safeName + '" data-mode="auto" onclick="startSequence(this)">&#9654; Full Auto</button>' +
                '<button class="seq-mode-btn" data-seq="' + safeName + '" data-mode="semi" onclick="startSequence(this)">&#9197; Semi Auto</button>' +
                '<button class="seq-mode-btn" data-seq="' + safeName + '" data-mode="boomerang" onclick="startSequence(this)">&#x1f501; Boomerang</button>' +
            '</div>';

        grid.appendChild(card);
    });
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function startSequence(btn) {
    const name = btn.getAttribute('data-seq');
    const mode = btn.getAttribute('data-mode');

    // Stop any running sequence first
    stopSequence();

    const seq = sequences.find(s => s.name === name);
    if (!seq || seq.steps.length === 0) return;

    activeSequence = {
        name: seq.name,
        steps: seq.steps,
        mode: mode,
        stepIndex: 0,
        direction: 1,
        timer: null
    };

    document.getElementById('globalStopBtn').classList.add('visible');
    showStatus();
    executeStep();
}

function executeStep() {
    if (!activeSequence) return;

    const { steps, stepIndex, mode } = activeSequence;
    const step = steps[stepIndex];

    // Fire the preset command
    goToPreset(step.preset);
    updateStatus();

    if (mode === 'semi') {
        // Show next button (or finish)
        showNextButton();
        return;
    }

    // Auto or Boomerang — schedule next step after delay
    const delay = step.delay > 0 ? step.delay * 1000 : 500;
    activeSequence.timer = setTimeout(() => {
        if (!activeSequence) return;
        advanceStep();
    }, delay);
}

function advanceStep() {
    if (!activeSequence) return;

    const { steps, mode, direction } = activeSequence;

    if (mode === 'boomerang') {
        const nextIndex = activeSequence.stepIndex + direction;

        if (nextIndex >= steps.length) {
            // Reached end, reverse direction
            activeSequence.direction = -1;
            activeSequence.stepIndex = steps.length - 2;
            if (activeSequence.stepIndex < 0) activeSequence.stepIndex = 0;
        } else if (nextIndex < 0) {
            // Reached start, reverse direction
            activeSequence.direction = 1;
            activeSequence.stepIndex = 1;
            if (activeSequence.stepIndex >= steps.length) activeSequence.stepIndex = 0;
        } else {
            activeSequence.stepIndex = nextIndex;
        }
        executeStep();
    } else {
        // Full auto — advance forward, loop at end
        activeSequence.stepIndex++;
        if (activeSequence.stepIndex >= steps.length) {
            activeSequence.stepIndex = 0;
        }
        executeStep();
    }
}

function showNextButton() {
    const area = document.getElementById('seqNextArea');
    if (!activeSequence) { area.innerHTML = ''; return; }

    const { steps, stepIndex } = activeSequence;
    const nextIndex = stepIndex + 1;

    if (nextIndex >= steps.length) {
        area.innerHTML = '<button class="seq-next-btn" onclick="stopSequence()">\u2714 Finish</button>';
    } else {
        const next = steps[nextIndex];
        const label = next.label ? next.label : 'Preset ' + next.preset;
        area.innerHTML = '<button class="seq-next-btn" onclick="semiNext()">Next \u2192 P' + next.preset + ' (' + escapeHtml(label) + ')</button>';
    }
}

function semiNext() {
    if (!activeSequence) return;
    activeSequence.stepIndex++;
    if (activeSequence.stepIndex >= activeSequence.steps.length) {
        stopSequence();
        return;
    }
    executeStep();
}

function stopSequence() {
    if (activeSequence && activeSequence.timer) {
        clearTimeout(activeSequence.timer);
    }
    activeSequence = null;

    document.getElementById('globalStopBtn').classList.remove('visible');
    document.getElementById('seqStatus').classList.remove('active');
    document.getElementById('seqNextArea').innerHTML = '';
}

function showStatus() {
    document.getElementById('seqStatus').classList.add('active');
    updateStatus();
}

function updateStatus() {
    if (!activeSequence) return;

    const modeLabels = { auto: 'Full Auto', semi: 'Semi Auto', boomerang: 'Boomerang' };
    const dirLabel = activeSequence.mode === 'boomerang'
        ? (activeSequence.direction === 1 ? ' \u25B6' : ' \u25C0')
        : '';

    document.getElementById('seqStatusName').textContent = activeSequence.name;
    document.getElementById('seqStatusBadge').textContent =
        modeLabels[activeSequence.mode] + ' — Step ' +
        (activeSequence.stepIndex + 1) + ' of ' + activeSequence.steps.length + dirLabel;

    const progress = document.getElementById('seqStepsProgress');
    progress.innerHTML = '';
    activeSequence.steps.forEach((step, i) => {
        const pip = document.createElement('span');
        pip.className = 'seq-step-pip';
        pip.textContent = 'P' + step.preset;
        if (i < activeSequence.stepIndex) pip.classList.add('done');
        if (i === activeSequence.stepIndex) pip.classList.add('active');
        progress.appendChild(pip);
    });
}

// Load sequences on page init
loadSequences();

// Start in MJPEG mode
switchToMJPEG();
</script>

</body>
</html>
