<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTZ Preset Controller</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- HLS.js for browsers that need it -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
    body {
        margin: 0;
        font-family: sans-serif;
        background: #f5f5f5;
    }

    header {
        background: #0078d4;
        color: white;
        padding: 12px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
    }

    .header-left h2 {
        margin: 0;
    }

    .header-right {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
    }

    .layout {
        display: flex;
        height: calc(100vh - 60px);
    }

    .preview {
        flex: 0 0 40%;
        background: black;
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .preview img,
    .preview video {
        width: 100%;
        height: auto;
        object-fit: contain;
    }

    .presets {
        flex: 1;
        overflow-y: auto;
    }

    .preset {
        background: white;
        padding: 10px 12px;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        border: 2px solid transparent;
        cursor: pointer;
        display: flex;
        flex-direction: column;
        gap: 8px;
        transition: border 0.15s, box-shadow 0.15s, transform 0.05s;
    }

    .preset:hover {
        border-color: #0078d4;
        box-shadow: 0 3px 8px rgba(0,0,0,0.2);
        transform: translateY(-1px);
    }

    .preset img {
        width: 100%;
        border-radius: 6px;
    }

    .preset-label {
        font-size: 15px;
        font-weight: 600;
        text-align: left;
    }

    button {
        padding: 8px 12px;
        font-size: 14px;
        border: none;
        border-radius: 6px;
        background: #0078d4;
        color: white;
        cursor: pointer;
        white-space: nowrap;
    }

    button:hover {
        background: #005fa3;
    }

    /* Thumbnail toggle */
    body.hide-thumbs .preset img {
        display: none;
    }

    /* === TAB BAR === */
    .tab-bar {
        display: flex;
        gap: 0;
        background: #e0e0e0;
        border-bottom: 2px solid #0078d4;
    }

    .tab-btn {
        padding: 10px 24px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        background: #e0e0e0;
        color: #555;
        cursor: pointer;
        border-bottom: 3px solid transparent;
        transition: background 0.15s, color 0.15s;
    }

    .tab-btn:hover {
        background: #d0d0d0;
    }

    .tab-btn.active {
        background: #f5f5f5;
        color: #0078d4;
        border-bottom-color: #0078d4;
    }

    .tab-panel {
        display: none;
        flex: 1;
        overflow-y: auto;
    }

    .tab-panel.active {
        display: block;
    }

    /* === SEQUENCES PANEL === */
    .sequences-panel {
        padding: 20px;
    }

    .seq-status {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        padding: 16px;
        margin-bottom: 16px;
        display: none;
    }

    .seq-status.active {
        display: block;
    }

    .seq-status-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 10px;
    }

    .seq-status-name {
        font-size: 16px;
        font-weight: 700;
        color: #0078d4;
    }

    .seq-status-badge {
        font-size: 12px;
        padding: 3px 10px;
        border-radius: 12px;
        background: #e8f4fd;
        color: #0078d4;
        font-weight: 600;
    }

    .seq-steps-progress {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
    }

    .seq-step-pip {
        padding: 4px 10px;
        border-radius: 4px;
        font-size: 12px;
        background: #f0f0f0;
        color: #888;
        transition: background 0.2s, color 0.2s;
    }

    .seq-step-pip.active {
        background: #0078d4;
        color: white;
        font-weight: 600;
    }

    .seq-step-pip.done {
        background: #d4edda;
        color: #155724;
    }

    .seq-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 12px;
    }

    .seq-card {
        background: white;
        border-radius: 8px;
        box-shadow: 0 2px 6px rgba(0,0,0,0.15);
        padding: 16px;
        border: 2px solid transparent;
        transition: border 0.15s, box-shadow 0.15s;
    }

    .seq-card:hover {
        border-color: #0078d4;
        box-shadow: 0 3px 8px rgba(0,0,0,0.2);
    }

    .seq-card-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 8px;
    }

    .seq-card-name {
        font-size: 16px;
        font-weight: 700;
    }

    .seq-loop-badge {
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        background: #e8f4fd;
        color: #0078d4;
        font-weight: 600;
    }

    .seq-card-meta {
        font-size: 13px;
        color: #777;
        margin-bottom: 12px;
    }

    .seq-card-steps {
        font-size: 12px;
        color: #999;
        margin-bottom: 12px;
        line-height: 1.5;
    }

    .seq-play-btn {
        width: 100%;
        padding: 8px;
        font-size: 14px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        background: #0078d4;
        color: white;
        transition: background 0.15s;
    }

    .seq-play-btn:hover {
        background: #005fa3;
    }

    .seq-play-btn.running {
        background: #d64045;
    }

    .seq-play-btn.running:hover {
        background: #b33438;
    }

    @media (max-width: 900px) and (orientation: landscape) {
        #presetGrid {
            grid-template-columns: repeat(2, 1fr) !important;
        }
        .preview {
            flex: 0 0 35%;
        }
    }

    @media (max-width: 700px) {
        .layout {
            flex-direction: column;
        }
        .preview {
            flex: 0 0 auto;
            height: 35vh;
        }
        #presetGrid {
            grid-template-columns: repeat(2, 1fr) !important;
        }
    }
</style>
</head>
<body>

<header>
    <div class="header-left">
        <h2>Camera Presets</h2>
    </div>
    <div class="header-right">
        <button onclick="switchToMJPEG()">MJPEG</button>
        <button onclick="switchToHLS()">HLS w/ 🔉</button>
        <button onclick="toggleThumbnails()">Thumbnails</button>
	<button onclick="requestWakeLock()">Keep Awake</button>
    </div>
</header>

<div class="layout">
    <div class="preview">
        <img id="liveFeed" style="display:block;">
	<video id="liveFeedVideo"
	       controls
	       playsinline
	       webkit-playsinline
	       autoplay muted
	       style="display:none; width:100%; height:auto;">
	</video>

    </div>

    <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
        <div class="tab-bar">
            <button class="tab-btn active" onclick="switchTab('presets')">Presets</button>
            <button class="tab-btn" onclick="switchTab('sequences')">Sequences</button>
        </div>

        <div class="tab-panel active presets" id="presetPanel">
            <div id="presetGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:20px;"></div>
        </div>

        <div class="tab-panel sequences-panel" id="sequencesPanel">
            <div class="seq-status" id="seqStatus">
                <div class="seq-status-header">
                    <span class="seq-status-name" id="seqStatusName"></span>
                    <span class="seq-status-badge" id="seqStatusBadge"></span>
                </div>
                <div class="seq-steps-progress" id="seqStepsProgress"></div>
            </div>
            <div class="seq-grid" id="seqGrid"></div>
        </div>
    </div>
</div>

<script>
// ------------------------------------------------------------
// CONFIGURATION
// ------------------------------------------------------------

// All camera access is proxied through this server.
// Apache (see sites-enabled/000-default.conf):
//   ProxyPass        /mjpeg  http://CAMERA_IP/cgi-bin/mjpeg connectiontimeout=5 timeout=1
//   ProxyPassReverse /mjpeg  http://CAMERA_IP/cgi-bin/mjpeg
//   ProxyPass        /hls/   http://ENCODER_IP:PORT/
//   ProxyPassReverse /hls/   http://ENCODER_IP:PORT/
//   ProxyPass        /cam/ptz http://CAMERA_IP/cgi-bin/aw_ptz
//   ProxyPassReverse /cam/ptz http://CAMERA_IP/cgi-bin/aw_ptz

// Wake Lock
let wakeLock = null;

async function requestWakeLock() {
  try {
    wakeLock = await navigator.wakeLock.request("screen");

    wakeLock.addEventListener("release", () => {
      console.log("Wake Lock was released");
    });

    console.log("Wake Lock is active");
  } catch (err) {
    console.error(`${err.name}, ${err.message}`);
  }
}

// Re-request if the tab becomes visible again
document.addEventListener("visibilitychange", () => {
  if (wakeLock !== null && document.visibilityState === "visible") {
    requestWakeLock();
  }
});


const LIVE_URL = "/mjpeg";            // proxied MJPEG
const HLS_URL  = "/hls/2.m3u8";  // proxied HLS

const PRESETS = [
    { number: 1,  label: "Full zoom out",                     image: "images/preset1.jpg" },
    { number: 2,  label: "Slightly zoomed in",                image: "images/preset2.jpg" },
    { number: 3,  label: "Standard view",                     image: "images/preset3.jpg" },
    { number: 4,  label: "Lectern (Homily)",                  image: "images/preset4.jpg" },
    { number: 5,  label: "Up close Altar",                    image: "images/preset5.jpg" },
    { number: 6,  label: "Icon above doors",                  image: "images/preset6.jpg" },
    { number: 7,  label: "Baptismal font",                    image: "images/preset7.jpg" },
    { number: 8,  label: "Choir loft",                        image: "images/none.jpg" },
    { number: 9,  label: "Center aisle",                      image: "images/preset9.jpg" },
    { number: 10, label: "Low announcements",                 image: "images/preset10.jpg" },
    { number: 11, label: "Michael to canter",                 image: "images/preset11.jpg" },
    { number: 12, label: "Closing announcements",             image: "images/preset12.jpg" },
    { number: 13, label: "Memorial service",                  image: "images/preset13.jpg" },
    { number: 14, label: "Choir Loft 2",                      image: "images/none.jpg" },
    { number: 15, label: "Chanter",                           image: "images/preset15.jpg" },
    { number: 16, label: "Saint Demetrios",                   image: "images/preset16.jpg" },
    { number: 17, label: "Lectern to Gabriel",                image: "images/preset17.jpg" },
    { number: 18, label: "Left Aisle",                        image: "images/preset18.jpg" },
    { number: 19, label: "Right Aisle",                       image: "images/preset19.jpg" },
    { number: 20, label: "Low center icon on easel",          image: "images/preset20.jpg" },
    { number: 21, label: "Choir Loft 3 (canter side)",        image: "images/none.jpg" },
    { number: 22, label: "Choir Loft 4 (forward - Pascha)",   image: "images/preset22.jpg" }
];

// ------------------------------------------------------------
// BUILD PRESET GRID
// ------------------------------------------------------------
const grid = document.getElementById("presetGrid");

PRESETS.forEach(preset => {
    const div = document.createElement("div");
    div.className = "preset";
    div.onclick = function() { goToPreset(preset.number, this); };

    const img = document.createElement("img");
    img.src = preset.image;

    const label = document.createElement("div");
    label.className = "preset-label";
    label.textContent = `${preset.number} — ${preset.label}`;

    div.appendChild(img);
    div.appendChild(label);
    grid.appendChild(div);
});

// ------------------------------------------------------------
// SEND PRESET COMMAND (proxied PTZ)
// ------------------------------------------------------------
function goToPreset(num, btn) {
    const index = num - 1;
    const cmd = index.toString().padStart(2, "0");
    const url = `/cam/ptz?cmd=%23R${cmd}&res=1`;

    fetch(url).then(r => {
        if (!r.ok) throw new Error(r.status);
    }).catch(() => {
        if (btn) {
            btn.style.outline = '2px solid #d64045';
            setTimeout(() => { btn.style.outline = ''; }, 1000);
        }
    });
}

// ------------------------------------------------------------
// MJPEG / HLS TOGGLE
// ------------------------------------------------------------
function switchToMJPEG() {
    const img = document.getElementById("liveFeed");
    const video = document.getElementById("liveFeedVideo");

    video.pause();
    video.style.display = "none";

    img.style.display = "block";
    img.src = LIVE_URL + "?t=" + Date.now(); // cache-bust to force reconnect
}

function switchToHLS() {
    const img = document.getElementById("liveFeed");
    const video = document.getElementById("liveFeedVideo");

    img.style.display = "none";
    video.style.display = "block";

    if (Hls.isSupported()) {
        const hls = new Hls();
        hls.loadSource(HLS_URL);
        hls.attachMedia(video);
        hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
    } else {
        video.src = HLS_URL;
        video.play();
    }
}

// ------------------------------------------------------------
// THUMBNAIL TOGGLE
// ------------------------------------------------------------
function toggleThumbnails() {
    document.body.classList.toggle("hide-thumbs");
}

// ------------------------------------------------------------
// TAB SWITCHING
// ------------------------------------------------------------
function switchTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

    if (tabName === 'presets') {
        document.getElementById('presetPanel').classList.add('active');
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
    } else {
        document.getElementById('sequencesPanel').classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }
}

// ------------------------------------------------------------
// SEQUENCE ENGINE
// ------------------------------------------------------------
let sequences = [];
let activeSequence = null;  // { name, steps, loop, stepIndex, timer }

async function loadSequences() {
    try {
        const resp = await fetch('sequences.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error(resp.status);
        sequences = await resp.json();
    } catch {
        sequences = [];
    }
    renderSequences();
}

function renderSequences() {
    const grid = document.getElementById('seqGrid');
    grid.innerHTML = '';

    if (sequences.length === 0) {
        grid.innerHTML = '<p style="color:#999;">No sequences found. Create a <code>sequences.json</code> file.</p>';
        return;
    }

    sequences.forEach(seq => {
        const card = document.createElement('div');
        card.className = 'seq-card';
        card.id = 'seq-card-' + seq.name.replace(/\s+/g, '-');

        const totalTime = seq.steps.reduce((s, st) => s + st.delay, 0);
        const stepList = seq.steps.map((st, i) =>
            `${i + 1}. Preset ${st.preset}` + (st.label ? ` (${st.label})` : '') + (st.delay > 0 ? ` — ${st.delay}s` : '')
        ).join('<br>');

        card.innerHTML =
            '<div class="seq-card-header">' +
                '<span class="seq-card-name">' + escapeHtml(seq.name) + '</span>' +
                (seq.loop ? '<span class="seq-loop-badge">&#x1f501; Loop</span>' : '') +
            '</div>' +
            '<div class="seq-card-meta">' +
                seq.steps.length + ' step' + (seq.steps.length !== 1 ? 's' : '') +
                (totalTime > 0 ? ' &middot; ' + totalTime + 's per cycle' : '') +
            '</div>' +
            '<div class="seq-card-steps">' + stepList + '</div>' +
            '<button class="seq-play-btn" data-seq="' + escapeHtml(seq.name) + '" onclick="toggleSequence(this)">&#9654; Play</button>';

        grid.appendChild(card);
    });
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function toggleSequence(btn) {
    const name = btn.getAttribute('data-seq');

    // If this sequence is already running, stop it
    if (activeSequence && activeSequence.name === name) {
        stopSequence();
        return;
    }

    // Stop any other running sequence first
    if (activeSequence) stopSequence();

    const seq = sequences.find(s => s.name === name);
    if (!seq) return;

    activeSequence = {
        name: seq.name,
        steps: seq.steps,
        loop: seq.loop,
        stepIndex: 0,
        timer: null
    };

    // Update button states
    document.querySelectorAll('.seq-play-btn').forEach(b => {
        b.classList.remove('running');
        b.innerHTML = '&#9654; Play';
    });
    btn.classList.add('running');
    btn.innerHTML = '&#9632; Stop';

    // Show status bar
    showStatus();
    runStep();
}

function runStep() {
    if (!activeSequence) return;

    const { steps, stepIndex, loop } = activeSequence;

    if (stepIndex >= steps.length) {
        if (loop) {
            activeSequence.stepIndex = 0;
            runStep();
        } else {
            stopSequence();
        }
        return;
    }

    const step = steps[stepIndex];
    goToPreset(step.preset);
    updateStatus();

    if (step.delay > 0) {
        activeSequence.timer = setTimeout(() => {
            if (!activeSequence) return;
            activeSequence.stepIndex++;
            runStep();
        }, step.delay * 1000);
    } else if (stepIndex < steps.length - 1) {
        // No delay but more steps — short pause for camera to acknowledge
        activeSequence.timer = setTimeout(() => {
            if (!activeSequence) return;
            activeSequence.stepIndex++;
            runStep();
        }, 500);
    } else {
        // Last step, no delay
        if (loop) {
            activeSequence.timer = setTimeout(() => {
                if (!activeSequence) return;
                activeSequence.stepIndex = 0;
                runStep();
            }, 500);
        } else {
            stopSequence();
        }
    }
}

function stopSequence() {
    if (activeSequence && activeSequence.timer) {
        clearTimeout(activeSequence.timer);
    }
    activeSequence = null;

    // Reset all buttons
    document.querySelectorAll('.seq-play-btn').forEach(b => {
        b.classList.remove('running');
        b.innerHTML = '&#9654; Play';
    });

    // Hide status
    document.getElementById('seqStatus').classList.remove('active');
}

function showStatus() {
    const status = document.getElementById('seqStatus');
    status.classList.add('active');
    updateStatus();
}

function updateStatus() {
    if (!activeSequence) return;

    document.getElementById('seqStatusName').textContent = activeSequence.name;
    document.getElementById('seqStatusBadge').textContent =
        'Step ' + (activeSequence.stepIndex + 1) + ' of ' + activeSequence.steps.length +
        (activeSequence.loop ? ' (looping)' : '');

    const progress = document.getElementById('seqStepsProgress');
    progress.innerHTML = '';
    activeSequence.steps.forEach((step, i) => {
        const pip = document.createElement('span');
        pip.className = 'seq-step-pip';
        pip.textContent = 'P' + step.preset;
        if (i < activeSequence.stepIndex) pip.classList.add('done');
        if (i === activeSequence.stepIndex) pip.classList.add('active');
        progress.appendChild(pip);
    });
}

// Load sequences on page init
loadSequences();

// Start in MJPEG mode
switchToMJPEG();
</script>

</body>
</html>
