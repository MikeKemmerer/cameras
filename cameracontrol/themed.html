<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PTZ Preset Controller</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
/* === SHARED BROADCAST-CONSOLE THEME === */
:root {
  --bg: #111;
  --fg: #eee;
  --panel: #1b1b1b;
  --accent: #3fa9f5;
  --button-bg: #222;
  --button-fg: #fff;
  --button-hover: #333;
}

body {
  margin: 0;
  font-family: sans-serif;
  background: var(--bg);
  color: var(--fg);
  overflow: hidden;
}

/* === HARDWARE PANELS === */
.panel {
  background: var(--panel);
  border-radius: 6px;
  border: 1px solid #000;
  box-shadow:
    0 0 0 1px #000 inset,
    0 2px 4px rgba(0,0,0,0.6);
}

/* === TACTILE BUTTONS === */
.console-button {
  background: var(--button-bg);
  color: var(--button-fg);
  border: 1px solid #000;
  border-radius: 4px;
  padding: 8px 14px;
  font-weight: 600;
  cursor: pointer;
  box-shadow:
    0 0 0 1px var(--accent),
    0 2px 4px rgba(0,0,0,0.6);
  transition: all 0.12s ease;
}

.console-button:hover {
  background: var(--button-hover);
  box-shadow:
    0 0 10px var(--accent),
    0 0 6px var(--accent) inset,
    0 2px 4px rgba(0,0,0,0.6);
}

.console-button:active {
  background: #111;
  box-shadow:
    0 0 0 1px var(--accent) inset,
    0 0 6px var(--accent) inset;
}

/* === HEADER === */
header {
  padding: 12px 20px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}
header.panel {
  border-bottom: 2px solid var(--accent);
}

.header-left h2 {
  margin: 0;
  color: var(--fg);
}

.header-right {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
}

/* === LAYOUT === */
.layout {
  display: flex;
  height: calc(100vh - 70px);
}

/* === PREVIEW === */
.preview {
  flex: 0 0 40%;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
}

.preview img,
.preview video {
  width: 100%;
  height: auto;
  object-fit: contain;
}

/* === PRESET GRID === */
.presets {
  flex: 1;
  overflow-y: auto;
}

/* === PRESET TILE === */
.preset {
  background: var(--panel);
  border-radius: 6px;
  border: 1px solid #000;
  padding: 8px;
  box-shadow:
    0 0 0 1px #000 inset,
    0 2px 4px rgba(0,0,0,0.6);
  cursor: pointer;
  display: flex;
  flex-direction: column;
  gap: 8px;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

.preset:hover {
  box-shadow:
    0 0 10px var(--accent),
    0 0 6px var(--accent) inset,
    0 2px 4px rgba(0,0,0,0.6);
  transform: translateY(-2px);
}

.preset img {
  width: 100%;
  border-radius: 4px;
}

/* === LABEL === */
.preset-label {
  font-size: 15px;
  font-weight: 600;
  color: var(--fg);
}

/* === THUMBNAIL TOGGLE === */
body.hide-thumbs .preset img {
  display: none;
}

/* === TAB BAR === */
.tab-bar {
  display: flex;
  gap: 0;
  background: #0d0d0d;
  border-bottom: 2px solid var(--accent);
  align-items: center;
}

.tab-bar .spacer {
  flex: 1;
}

.thumb-toggle {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-right: 14px;
  font-size: 12px;
  font-weight: 600;
  color: #888;
  cursor: pointer;
  user-select: none;
}

.thumb-toggle .switch {
  position: relative;
  width: 34px;
  height: 18px;
  background: #444;
  border-radius: 9px;
  transition: background 0.2s;
}

.thumb-toggle .switch::after {
  content: '';
  position: absolute;
  top: 2px;
  left: 2px;
  width: 14px;
  height: 14px;
  background: #ccc;
  border-radius: 50%;
  transition: transform 0.2s;
}

.thumb-toggle input { display: none; }

.thumb-toggle input:checked + .switch {
  background: var(--accent);
}

.thumb-toggle input:checked + .switch::after {
  transform: translateX(16px);
}

.tab-btn {
  padding: 10px 24px;
  font-size: 14px;
  font-weight: 600;
  border: none;
  background: #0d0d0d;
  color: #888;
  cursor: pointer;
  border-bottom: 3px solid transparent;
  transition: background 0.15s, color 0.15s;
}

.tab-btn:hover {
  background: #1a1a1a;
}

.tab-btn.active {
  background: var(--bg);
  color: var(--accent);
  border-bottom-color: var(--accent);
}

.tab-panel {
  display: none;
  flex: 1;
  overflow-y: auto;
}

.tab-panel.active {
  display: block;
}

/* === SEQUENCES PANEL === */
.sequences-panel {
  padding: 16px;
}

.seq-status {
  background: var(--panel);
  border-radius: 6px;
  border: 1px solid #000;
  box-shadow: 0 0 0 1px #000 inset, 0 2px 4px rgba(0,0,0,0.6);
  padding: 16px;
  margin-bottom: 16px;
  display: none;
}

.seq-status.active {
  display: block;
}

.seq-status-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
  flex-wrap: wrap;
  gap: 8px;
}

.seq-loop-toggle {
  display: none;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  color: var(--fg-dim, #999);
  cursor: pointer;
  user-select: none;
}

.seq-loop-toggle.visible {
  display: flex;
}

.seq-loop-toggle input[type="checkbox"] {
  width: 16px;
  height: 16px;
  cursor: pointer;
  accent-color: var(--accent);
}

.seq-status-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--accent);
}

.seq-status-badge {
  font-size: 12px;
  padding: 3px 10px;
  border-radius: 12px;
  background: rgba(63,169,245,0.15);
  color: var(--accent);
  font-weight: 600;
}

.seq-steps-progress {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

.seq-step-pip {
  padding: 4px 10px;
  border-radius: 4px;
  font-size: 12px;
  background: #222;
  color: #888;
  transition: background 0.2s, color 0.2s;
}

.seq-step-pip.active {
  background: var(--accent);
  color: #000;
  font-weight: 600;
  box-shadow: 0 0 8px var(--accent);
}

.seq-step-pip.done {
  background: #1a3d1a;
  color: #6fcf6f;
}

.seq-next-btn {
  padding: 10px 20px;
  font-size: 14px;
  font-weight: 600;
  border: 1px solid #000;
  border-radius: 4px;
  cursor: pointer;
  background: #1a5a2a;
  color: #6fcf6f;
  box-shadow: 0 0 0 1px #28a745, 0 2px 4px rgba(0,0,0,0.6);
  transition: all 0.12s ease;
}

.seq-next-btn:hover {
  background: #247a38;
  box-shadow: 0 0 10px #28a745, 0 0 6px #28a745 inset, 0 2px 4px rgba(0,0,0,0.6);
}

.seq-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 12px;
}

.seq-card {
  background: var(--panel);
  border-radius: 6px;
  border: 1px solid #000;
  box-shadow: 0 0 0 1px #000 inset, 0 2px 4px rgba(0,0,0,0.6);
  padding: 16px;
  transition: transform 0.1s ease, box-shadow 0.1s ease;
}

.seq-card:hover {
  box-shadow:
    0 0 10px var(--accent),
    0 0 6px var(--accent) inset,
    0 2px 4px rgba(0,0,0,0.6);
  transform: translateY(-2px);
}

.seq-card-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}

.seq-card-name {
  font-size: 16px;
  font-weight: 700;
  color: var(--fg);
}

.seq-card-meta {
  font-size: 13px;
  color: #888;
  margin-bottom: 10px;
}

.seq-card-steps {
  font-size: 12px;
  color: #666;
  margin-bottom: 12px;
  line-height: 1.5;
}

.seq-mode-btns {
  display: flex;
  gap: 6px;
}

.seq-mode-btn {
  flex: 1;
  padding: 7px 4px;
  font-size: 12px;
  font-weight: 600;
  border: 1px solid #000;
  border-radius: 4px;
  cursor: pointer;
  background: var(--button-bg);
  color: var(--button-fg);
  box-shadow: 0 0 0 1px var(--accent), 0 2px 4px rgba(0,0,0,0.6);
  transition: all 0.12s ease;
}

.seq-mode-btn:hover {
  background: var(--button-hover);
  box-shadow: 0 0 10px var(--accent), 0 0 6px var(--accent) inset, 0 2px 4px rgba(0,0,0,0.6);
}

.seq-mode-btn:active {
  background: #111;
  box-shadow: 0 0 0 1px var(--accent) inset, 0 0 6px var(--accent) inset;
}

/* Global stop button */
#globalStopBtn {
  display: none;
  background: #5a1a1d;
  box-shadow: 0 0 0 1px #d64045, 0 2px 4px rgba(0,0,0,0.6);
  animation: pulse-stop 1.5s infinite;
}

#globalStopBtn:hover {
  background: #7a2428;
  box-shadow: 0 0 10px #d64045, 0 0 6px #d64045 inset, 0 2px 4px rgba(0,0,0,0.6);
}

#globalStopBtn.visible {
  display: inline-block;
}

@keyframes pulse-stop {
  0%, 100% { box-shadow: 0 0 0 0 rgba(214,64,69,0.5), 0 0 0 1px #d64045; }
  50% { box-shadow: 0 0 0 6px rgba(214,64,69,0), 0 0 0 1px #d64045; }
}

/* === RESPONSIVE === */
@media (max-width: 900px) and (orientation: landscape) {
  #presetGrid {
    grid-template-columns: repeat(2, 1fr) !important;
  }
  .preview {
    flex: 0 0 35%;
  }
}

@media (max-width: 700px) {
  .layout {
    flex-direction: column;
  }
  .preview {
    flex: 0 0 auto;
    height: 35vh;
  }
  #presetGrid {
    grid-template-columns: repeat(2, 1fr) !important;
  }
}
</style>
</head>

<body>

<header class="panel">
  <div class="header-left">
    <h2>Camera Presets</h2>
  </div>
  <div class="header-right">
    <button class="console-button" id="globalStopBtn" onclick="stopSequence()">&#9632; Stop Sequence</button>
    <button class="console-button" onclick="switchToMJPEG()">Preview</button>
    <button class="console-button" onclick="switchToHLS()">Live with Audio</button>
  </div>
</header>

<div class="layout">
  <div class="preview panel">
    <img id="liveFeed" style="display:block;">
    <video id="liveFeedVideo"
           controls
           playsinline
           webkit-playsinline
           autoplay muted
           style="display:none; width:100%; height:auto;">
    </video>
  </div>

  <div style="flex:1; display:flex; flex-direction:column; overflow:hidden;">
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('presets')">Presets</button>
      <button class="tab-btn" onclick="switchTab('sequences')">Sequences</button>
      <div class="spacer"></div>
      <label class="thumb-toggle">
        <input type="checkbox" id="thumbToggle" checked onchange="toggleThumbnails()">
        <span class="switch"></span>
        Thumbs
      </label>
    </div>

    <div class="tab-panel active presets" id="presetPanel">
      <div id="presetGrid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; padding:16px;"></div>
    </div>

    <div class="tab-panel sequences-panel" id="sequencesPanel">
      <div class="seq-status" id="seqStatus">
        <div class="seq-status-header">
          <span class="seq-status-name" id="seqStatusName"></span>
          <label class="seq-loop-toggle" id="seqLoopToggle">
            <input type="checkbox" id="seqLoopCheckbox"> Loop
          </label>
          <span class="seq-status-badge" id="seqStatusBadge"></span>
        </div>
        <div class="seq-steps-progress" id="seqStepsProgress"></div>
        <div id="seqNextArea"></div>
      </div>
      <div class="seq-grid" id="seqGrid"></div>
    </div>
  </div>
</div>

<script>
/* unchanged JS — all logic preserved exactly */
const LIVE_URL = "/mjpeg";
const HLS_URL  = "/hls/2.m3u8";

// Load presets from config & build grid
fetch('presets.json')
  .then(r => r.json())
  .then(presets => {
    const grid = document.getElementById("presetGrid");
    presets.forEach(preset => {
      const div = document.createElement("div");
      div.className = "preset";
      div.onclick = function() { goToPreset(preset.number, this); };

      const img = document.createElement("img");
      img.src = preset.image;

      const label = document.createElement("div");
      label.className = "preset-label";
      label.textContent = `${preset.number} — ${preset.label}`;

      div.appendChild(img);
      div.appendChild(label);
      grid.appendChild(div);
    });
  })
  .catch(err => console.error('Failed to load presets:', err));

function goToPreset(num, btn) {
  // Manual preset selection stops any running sequence
  if (btn) stopSequence();

  const index = num - 1;
  const cmd = index.toString().padStart(2, "0");
  fetch(`/cam/ptz?cmd=%23R${cmd}&res=1`).then(r => {
    if (!r.ok) throw new Error(r.status);
  }).catch(() => {
    if (btn) {
      btn.style.outline = '2px solid #d64045';
      setTimeout(() => { btn.style.outline = ''; }, 1000);
    }
  });
}

function switchToMJPEG() {
  const img = document.getElementById("liveFeed");
  const video = document.getElementById("liveFeedVideo");
  video.pause();
  video.style.display = "none";
  img.style.display = "block";
  img.src = LIVE_URL + "?t=" + Date.now();
}

function switchToHLS() {
  const img = document.getElementById("liveFeed");
  const video = document.getElementById("liveFeedVideo");
  img.style.display = "none";
  video.style.display = "block";

  if (Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(HLS_URL);
    hls.attachMedia(video);
    hls.on(Hls.Events.MANIFEST_PARSED, () => video.play());
  } else {
    video.src = HLS_URL;
    video.play();
  }
}

function toggleThumbnails() {
  document.body.classList.toggle("hide-thumbs");
}

// ------------------------------------------------------------
// TAB SWITCHING
// ------------------------------------------------------------
function switchTab(tabName) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

    if (tabName === 'presets') {
        document.getElementById('presetPanel').classList.add('active');
        document.querySelectorAll('.tab-btn')[0].classList.add('active');
        stopSequence();
    } else {
        document.getElementById('sequencesPanel').classList.add('active');
        document.querySelectorAll('.tab-btn')[1].classList.add('active');
    }
}

// ------------------------------------------------------------
// SEQUENCE ENGINE
// ------------------------------------------------------------
let sequences = [];
let activeSequence = null;

async function loadSequences() {
    try {
        const resp = await fetch('sequences.json', { cache: 'no-store' });
        if (!resp.ok) throw new Error(resp.status);
        sequences = await resp.json();
    } catch {
        sequences = [];
    }
    renderSequences();
}

function renderSequences() {
    const grid = document.getElementById('seqGrid');
    grid.innerHTML = '';

    if (sequences.length === 0) {
        grid.innerHTML = '<p style="color:#666;">No sequences found. Create a <code>sequences.json</code> file.</p>';
        return;
    }

    sequences.forEach(seq => {
        const card = document.createElement('div');
        card.className = 'seq-card';

        const totalTime = seq.steps.reduce((s, st) => s + st.delay, 0);
        const stepList = seq.steps.map((st, i) =>
            `${i + 1}. Preset ${st.preset}` + (st.label ? ` (${st.label})` : '') + (st.delay > 0 ? ` \u2014 ${st.delay}s` : '')
        ).join('<br>');

        const safeName = escapeHtml(seq.name);

        card.innerHTML =
            '<div class="seq-card-header">' +
                '<span class="seq-card-name">' + safeName + '</span>' +
            '</div>' +
            '<div class="seq-card-meta">' +
                seq.steps.length + ' step' + (seq.steps.length !== 1 ? 's' : '') +
                (totalTime > 0 ? ' &middot; ' + totalTime + 's per cycle' : '') +
            '</div>' +
            '<div class="seq-card-steps">' + stepList + '</div>' +
            '<div class="seq-mode-btns">' +
                '<button class="seq-mode-btn" data-seq="' + safeName + '" data-mode="auto" onclick="startSequence(this)">&#9654; Full Auto</button>' +
                '<button class="seq-mode-btn" data-seq="' + safeName + '" data-mode="semi" onclick="startSequence(this)">&#9197; Semi Auto</button>' +
                '<button class="seq-mode-btn" data-seq="' + safeName + '" data-mode="boomerang" onclick="startSequence(this)">&#x1f501; Boomerang</button>' +
            '</div>';

        grid.appendChild(card);
    });
}

function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
}

function startSequence(btn) {
    const name = btn.getAttribute('data-seq');
    const mode = btn.getAttribute('data-mode');

    stopSequence();

    const seq = sequences.find(s => s.name === name);
    if (!seq || seq.steps.length === 0) return;

    activeSequence = {
        name: seq.name,
        steps: seq.steps,
        mode: mode,
        stepIndex: 0,
        direction: 1,
        timer: null
    };

    document.getElementById('globalStopBtn').classList.add('visible');
    const loopToggle = document.getElementById('seqLoopToggle');
    const loopCheckbox = document.getElementById('seqLoopCheckbox');
    if (mode === 'auto') {
        loopToggle.classList.add('visible');
        loopCheckbox.checked = false;
    } else {
        loopToggle.classList.remove('visible');
    }
    showStatus();
    executeStep();
}

function executeStep() {
    if (!activeSequence) return;

    const { steps, stepIndex, mode } = activeSequence;
    const step = steps[stepIndex];

    goToPreset(step.preset);
    updateStatus();

    if (mode === 'semi') {
        showNextButton();
        return;
    }

    const delay = step.delay > 0 ? step.delay * 1000 : 500;
    activeSequence.timer = setTimeout(() => {
        if (!activeSequence) return;
        advanceStep();
    }, delay);
}

function advanceStep() {
    if (!activeSequence) return;

    const { steps, mode, direction } = activeSequence;

    if (mode === 'boomerang') {
        const nextIndex = activeSequence.stepIndex + direction;

        if (nextIndex >= steps.length) {
            activeSequence.direction = -1;
            activeSequence.stepIndex = steps.length - 2;
            if (activeSequence.stepIndex < 0) activeSequence.stepIndex = 0;
        } else if (nextIndex < 0) {
            activeSequence.direction = 1;
            activeSequence.stepIndex = 1;
            if (activeSequence.stepIndex >= steps.length) activeSequence.stepIndex = 0;
        } else {
            activeSequence.stepIndex = nextIndex;
        }
        executeStep();
    } else {
        activeSequence.stepIndex++;
        if (activeSequence.stepIndex >= steps.length) {
            if (document.getElementById('seqLoopCheckbox').checked) {
                activeSequence.stepIndex = 0;
            } else {
                stopSequence();
                return;
            }
        }
        executeStep();
    }
}

function showNextButton() {
    const area = document.getElementById('seqNextArea');
    if (!activeSequence) { area.innerHTML = ''; return; }

    const { steps, stepIndex } = activeSequence;
    const nextIndex = stepIndex + 1;

    if (nextIndex >= steps.length) {
        area.innerHTML = '<button class="seq-next-btn" onclick="stopSequence()">\u2714 Finish</button>';
    } else {
        const next = steps[nextIndex];
        const label = next.label ? next.label : 'Preset ' + next.preset;
        area.innerHTML = '<button class="seq-next-btn" onclick="semiNext()">Next \u2192 P' + next.preset + ' (' + escapeHtml(label) + ')</button>';
    }
}

function semiNext() {
    if (!activeSequence) return;
    activeSequence.stepIndex++;
    if (activeSequence.stepIndex >= activeSequence.steps.length) {
        stopSequence();
        return;
    }
    executeStep();
}

function stopSequence() {
    if (activeSequence && activeSequence.timer) {
        clearTimeout(activeSequence.timer);
    }
    activeSequence = null;

    document.getElementById('globalStopBtn').classList.remove('visible');
    document.getElementById('seqStatus').classList.remove('active');
    document.getElementById('seqNextArea').innerHTML = '';
    document.getElementById('seqLoopToggle').classList.remove('visible');
}

function showStatus() {
    document.getElementById('seqStatus').classList.add('active');
    updateStatus();
}

function updateStatus() {
    if (!activeSequence) return;

    const modeLabels = { auto: 'Full Auto', semi: 'Semi Auto', boomerang: 'Boomerang' };
    const dirLabel = activeSequence.mode === 'boomerang'
        ? (activeSequence.direction === 1 ? ' \u25B6' : ' \u25C0')
        : '';

    document.getElementById('seqStatusName').textContent = activeSequence.name;
    document.getElementById('seqStatusBadge').textContent =
        modeLabels[activeSequence.mode] + ' \u2014 Step ' +
        (activeSequence.stepIndex + 1) + ' of ' + activeSequence.steps.length + dirLabel;

    const progress = document.getElementById('seqStepsProgress');
    progress.innerHTML = '';
    activeSequence.steps.forEach((step, i) => {
        const pip = document.createElement('span');
        pip.className = 'seq-step-pip';
        pip.textContent = 'P' + step.preset;
        if (i < activeSequence.stepIndex) pip.classList.add('done');
        if (i === activeSequence.stepIndex) pip.classList.add('active');
        progress.appendChild(pip);
    });
}

loadSequences();

switchToMJPEG();
</script>

</body>
</html>
